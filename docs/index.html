<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste de sessão</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }

        #status {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        video {
            width: 320px;
            max-width: 90%;
            margin-top: 20px;
            border-radius: 12px;
        }

        #logs {
            margin-top: 30px;
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
        }

        .log {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <h1>teste de sessão privada</h1>

    <button id="entrar">
        entrar
    </button>

    <button id="parar">
    parar câmera
    </button>
    
    <div id="status">
        desconectado
    </div>

    <video
        id="preview"
        autoplay
        muted
        playsinline>
    </video>

    <div id="logs"></div>

    <script>

let stream;
let monitor;

function adicionarLog(texto) {

    console.log(texto);

    const logs = document.getElementById("logs");

    const linha = document.createElement("div");
    linha.className = "log";

    const horario = new Date().toLocaleTimeString();

    linha.innerText = `[${horario}] ${texto}`;

    logs.prepend(linha);

}

function monitorarTracks() {

    if (monitor) {
        clearInterval(monitor);
    }

    monitor = setInterval(() => {

        if (!stream) return;

        const videoTrack = stream.getVideoTracks()[0];
        const audioTrack = stream.getAudioTracks()[0];

        if (videoTrack) {

            adicionarLog(
                `📷 vídeo | state=${videoTrack.readyState} | enabled=${videoTrack.enabled} | muted=${videoTrack.muted}`
            );

        }

        if (audioTrack) {

            adicionarLog(
                `🎤 áudio | state=${audioTrack.readyState} | enabled=${audioTrack.enabled} | muted=${audioTrack.muted}`
            );

        }

    }, 5000);

}

async function iniciar() {

    try {

        stream = await navigator.mediaDevices.getUserMedia({
    video: false,
    audio: true
});

        document
            .getElementById("preview")
            .srcObject = stream;

        document
            .getElementById("status")
            .innerText = "🟢 conectado";

        adicionarLog("câmera e microfone iniciados");

        const videoTrack = stream.getVideoTracks()[0];
        const audioTrack = stream.getAudioTracks()[0];

        if (videoTrack) {

            videoTrack.addEventListener("ended", () => {
                adicionarLog("📷 câmera encerrada (ended)");
            });

            videoTrack.addEventListener("mute", () => {
                adicionarLog("📷 câmera ficou indisponível (mute)");
            });

            videoTrack.addEventListener("unmute", () => {
                adicionarLog("📷 câmera voltou (unmute)");
            });

        }

        if (audioTrack) {

            audioTrack.addEventListener("ended", () => {
                adicionarLog("🎤 microfone encerrado (ended)");
            });

            audioTrack.addEventListener("mute", () => {
                adicionarLog("🎤 microfone ficou indisponível (mute)");
            });

            audioTrack.addEventListener("unmute", () => {
                adicionarLog("🎤 microfone voltou (unmute)");
            });

        }

        monitorarTracks();

    } catch (err) {

        document
            .getElementById("status")
            .innerText = "🔴 permissão negada";

        adicionarLog("erro ao acessar câmera/microfone");

        console.error(err);

    }

}

function pararCamera() {

    if (!stream) {
        adicionarLog("nenhuma captura ativa");
        return;
    }

    stream.getTracks().forEach(track => {
        track.stop();
    });

    clearInterval(monitor);

    document
        .getElementById("preview")
        .srcObject = null;

    document
        .getElementById("status")
        .innerText = "🔴 desconectado";

    adicionarLog("🛑 captura encerrada manualmente");

}

document
    .getElementById("entrar")
    .addEventListener("click", iniciar);

document
    .getElementById("parar")
    .addEventListener("click", pararCamera);

document.addEventListener("visibilitychange", () => {

    if (document.hidden) {

        adicionarLog("⚠️ usuário saiu da aba");

    } else {

        adicionarLog("✅ usuário voltou para a aba");

    }

});

window.addEventListener("beforeunload", () => {

    adicionarLog("❌ usuário fechou ou recarregou a página");

});

</script>

</body>
</html>
